
<div class="registry-container">
  <h3 class="registry-header">➕ Add New Task</h3>
  
  <div class="list-body">
    <div class="form-group">
      <label>Task Description</label>
      <input 
        [(ngModel)]="taskText" 
        placeholder="What needs to be done?" 
        class="dark-input" 
      />
    </div>

    <div class="form-group">
      <label>Urgency Level</label>
      <select [(ngModel)]="urgency" class="dark-select" [ngClass]="urgency">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>
    </div>

    <button class="submit-btn" (click)="onSubmit()">Add Task</button>
  </div>
</div>
